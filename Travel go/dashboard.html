<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TravelGo Admin Dashboard</title>

  <link rel="stylesheet" href="./styles.css" />
  <style>
    body      { font-family: Arial, sans-serif; padding: 2rem; }
    h2        { margin-top: 3rem; }
    table     { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td    { padding: 0.6rem 0.8rem; border: 1px solid #ccc; }
    th        { background: #f2f2f2; text-align: left; }
    button    { padding: 0.3rem 0.7rem; cursor: pointer; }
    .danger   { background: #e74c3c; color: #fff; border: none; }
    .counter  { font-size: 0.9rem; color: #666; }
  </style>

  <script type="module" src="dashboard.js"></script>
</head>
<body>
  <h1>TravelGo Admin Dashboard</h1>

  <h2>Bookings <span id="bookingCount" class="counter"></span></h2>
  <table id="bookingTable">
    <thead>
      <tr>
        <th>Destination</th><th>Name</th><th>Email</th><th>Date</th>
        <th>People</th><th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <h2>Contact Messages <span id="contactCount" class="counter"></span></h2>
  <table id="contactTable">
    <thead>
      <tr>
        <th>Name</th><th>Email</th><th>Message</th><th>Received</th><th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</body>
</html>
